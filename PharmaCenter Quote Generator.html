<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PharmaCenter — Quote</title>

<!-- Fonts via Google Fonts CDN — falls back to system serifs/sans if blocked. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<!-- React + Babel (via CDN). For fully offline hosting, swap to the vendored copies in assets/vendor/. -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<style>
/* =========================================================================
   PharmaCenter — Quote
   Clean / clinical / premium. Teal primary, sage green micro-accent.
   Architectural twin of the Packing List (same tokens, same shell).
   ========================================================================= */
:root{
  /* Official PharmaCenter brand */
  --teal-900:#0f4a56;
  --teal-700:#1d6c7b;
  --teal-500:#3a8d9c;
  --sage-700:#5f8e3a;
  --sage-500:#7fb04f;
  --sage-300:#bcd596;
  --cream:#f6efe3;
  --cream-soft:#fbf6ec;
  --paper:#fffdf8;

  --accent:    var(--teal-700);
  --accent-2:  var(--sage-500);
  --accent-soft:#eef4ee;
  --ink:    #1f2a2d;
  --ink-2:  #415056;
  --ink-3:  #8a9498;
  --line:   #e3dcc9;
  --line-2: #efe9da;
  --bg:     #e7ddc8;

  --serif:"Cormorant Garamond", Georgia, serif;
  --sans:"Nunito", -apple-system, system-ui, Arial, sans-serif;

  --pad: 0.62in;
  --row: 9px;
  --fs:  10.5pt;
}

*{ box-sizing:border-box; }

html,body{ margin:0; padding:0; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:var(--fs);
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum" 1;
}
.mono{ font-family:"IBM Plex Mono", ui-monospace, monospace; font-feature-settings:"tnum" 1; }

/* ---- Stage (screen only) ---- */
.stage{
  display:flex; flex-direction:column; align-items:center;
  gap:26px; padding:26px 0 60px;
}

/* ---- The page ---- */
.sheet{
  width:8.5in;
  min-height:11in;
  background:var(--paper);
  padding:var(--pad);
  position:relative;
  display:flex; flex-direction:column;
  box-shadow:0 1px 0 rgba(15,74,86,.04), 0 18px 44px -22px rgba(15,74,86,.32);
}

/* =======================  LETTERHEAD  ======================= */
.lh{
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:24px; padding-bottom:12px;
}
.lh__brand{ display:flex; align-items:center; }
.logo__img{ height:52px; width:auto; display:block; }

.lh__info{
  text-align:right; font-size:8.8px; line-height:1.62; color:var(--ink-2);
}
.lh__co{ font-weight:700; color:var(--teal-900); font-size:9.6px; letter-spacing:.01em; }
.lh__contact{
  display:flex; flex-direction:column; gap:0; margin-top:5px;
  color:var(--teal-700); font-weight:700;
}

/* =======================  TITLE BAR  ======================= */
.titlebar{
  display:flex; align-items:flex-end; justify-content:space-between;
  border-top:2.5px solid var(--accent);
  padding-top:12px; margin-top:2px;
}
.titlebar h1{
  margin:0; font-family:var(--serif); font-size:46px; font-weight:500; letter-spacing:-.005em;
  color:var(--teal-900); line-height:.9; white-space:nowrap;
}
.titlebar__head{ display:flex; flex-direction:column; gap:11px; }
.titlebar__sub{ display:flex; flex-direction:column; gap:3px; }
.titlebar__date{
  font-family:var(--sans); font-size:8px; font-weight:700; letter-spacing:.18em;
  text-transform:uppercase; color:var(--ink-3);
}
.titlebar__meta{ display:flex; gap:22px; margin:0; }
.titlebar__meta div{ display:flex; flex-direction:column; gap:2px; text-align:right; }
.titlebar__meta dt{
  font-size:7px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink-3);
}
.titlebar__meta dd{ margin:0; font-size:11px; font-weight:600; color:var(--ink); }

/* the "Valid Through" mini-badge to the right of the title */
.titlebar__valid{
  display:inline-flex; align-items:center; gap:6px; padding:3px 10px;
  background:var(--accent-soft); border:1px solid var(--sage-300); color:var(--sage-700);
  border-radius:99px; font-size:8px; font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; margin-left:6px; vertical-align:middle;
}
.titlebar__valid b{ font-weight:800; color:var(--teal-900); letter-spacing:.06em; }

/* =======================  PARTIES (Bill-To / Ship-To)  ======================= */
.parties{
  display:grid; grid-template-columns:1fr 1fr; gap:0;
  margin-top:15px; border:1px solid var(--line); border-radius:3px; overflow:hidden;
}
.party{ padding:10px 15px; }
.party + .party{ border-left:1px solid var(--line); background:#FBFCFC; }
.party__label{
  display:block; font-size:7px; font-weight:700; letter-spacing:.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:8px;
}
.party__body{ font-size:9.8px; line-height:1.62; color:var(--ink); }
.party__body strong{ font-weight:700; }
.party__body .muted{ color:var(--ink-3); font-style:italic; }

/* =======================  DETAIL STRIP  ======================= */
.deets{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:0;
  margin-top:9px; border:1px solid var(--line); border-radius:3px; overflow:hidden;
}
.deet{ padding:9px 14px; border-left:1px solid var(--line-2); }
.deet:first-child{ border-left:none; }
.deet dt{ font-size:7px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); }
.deet dd{ margin:3px 0 0; font-size:10px; font-weight:700; color:var(--ink); }
.deet dd.mono{ font-size:11px; }

/* =======================  LINE-ITEM TABLE  ======================= */
.block{ margin-top:16px; }
.block__head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; }
.block__head h2{
  margin:0; font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink);
}
.block__note{ font-size:8.5px; color:var(--ink-3); font-weight:500; }

.tbl{ width:100%; border-collapse:collapse; font-size:10px; }
.tbl thead th{
  font-size:7px; font-weight:700; letter-spacing:.13em; text-transform:uppercase;
  color:var(--ink-2); text-align:left; padding:0 10px var(--row) 10px;
  border-bottom:1.5px solid var(--ink);
}
.tbl tbody td{
  padding:var(--row) 10px; border-bottom:1px solid var(--line-2); color:var(--ink);
  vertical-align:top;
}
.tbl tbody tr:nth-child(even) td{ background:#FAFCFB; }
.tbl tfoot td{
  padding:8px 10px; font-weight:700; color:var(--ink);
  border-top:1.5px solid var(--ink); font-size:9px;
}
.tbl .c-line{ width:34px; color:var(--ink-3); text-align:center; }
.tbl .c-sku{ width:90px; color:var(--ink-2); }
.tbl .c-desc{ color:var(--ink); }
.tbl .c-qty{ width:62px; text-align:right; }
.tbl .c-price{ width:88px; text-align:right; }
.tbl .c-ext{ width:96px; text-align:right; font-weight:700; }
.tbl thead th.c-qty, .tbl thead th.c-price, .tbl thead th.c-ext{ text-align:right; }

.tbl .lineno{
  display:inline-flex; align-items:center; justify-content:center;
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); color:#fff; font-weight:700; font-size:9px;
}
.tbl td .item-name{ font-weight:700; color:var(--teal-900); }
.tbl td .item-sub{ display:block; margin-top:2px; font-size:8.5px; color:var(--ink-3); line-height:1.4; }

/* =======================  TOTALS / SUMMARY  ======================= */
.totalsrow{
  margin-top:12px; display:grid; grid-template-columns: 1fr 280px; gap:18px; align-items:start;
}
.terms{
  border:1px dashed var(--line); border-radius:3px; padding:10px 14px;
  font-size:9px; line-height:1.55; color:var(--ink-2);
}
.terms__label{
  display:block; font-size:7px; font-weight:700; letter-spacing:.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:6px;
}

.summary{
  border:1px solid var(--line); border-radius:3px; overflow:hidden;
  background:#fff;
}
.summary__row{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:7px 14px; border-bottom:1px solid var(--line-2);
  font-size:10px;
}
.summary__row:last-of-type{ border-bottom:none; }
.summary__row dt{ color:var(--ink-2); font-weight:600; letter-spacing:.02em; }
.summary__row dd{ margin:0; color:var(--ink); font-weight:700; }
.summary__row.is-discount dd{ color:var(--sage-700); }
.summary__grand{
  display:flex; justify-content:space-between; align-items:baseline;
  background:var(--teal-900); color:#fff; padding:11px 14px;
}
.summary__grand dt{
  font-family:var(--serif); font-size:14px; font-weight:600; letter-spacing:.01em;
}
.summary__grand dd{ margin:0; font-size:18px; font-weight:700; color:#fff; }

/* =======================  NOTES + SIGNATURE  ======================= */
.notes{
  margin-top:14px; border:1px solid var(--line); border-radius:3px;
  padding:9px 15px; display:flex; gap:14px; align-items:flex-start;
  background:var(--accent-soft);
}
.notes__label{
  font-size:7px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--accent); white-space:nowrap; padding-top:2px; min-width:54px;
}
.notes p{ margin:0; font-size:9px; line-height:1.5; color:var(--ink-2); white-space:pre-wrap; }

.signbox{
  margin-top:14px; border:1px solid var(--line); border-radius:3px;
  padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:24px;
}
.signbox__col{ display:flex; flex-direction:column; gap:6px; }
.signbox__label{
  font-size:7px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--accent);
}
.signbox__line{
  border-bottom:1px solid var(--ink); height:30px; display:block;
}
.signbox__hint{ font-size:8px; color:var(--ink-3); font-weight:600; letter-spacing:.04em; text-transform:uppercase; }

/* =======================  FOOTER  ======================= */
.ft{
  margin-top:auto; padding-top:13px; border-top:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
}
.ft__msg{ font-size:9.5px; font-weight:600; color:var(--accent); letter-spacing:.01em; }
.ft__meta{ font-size:8px; color:var(--ink-3); letter-spacing:.04em; }

/* =======================  GENERATOR UI  ======================= */
.gen{ display:flex; min-height:100vh; }
.gen__editor{
  width:440px; flex:none; height:100vh; overflow-y:auto;
  background:#fff; border-right:1px solid var(--line);
  display:flex; flex-direction:column;
}
.gen__preview{ flex:1 1 auto; height:100vh; overflow-y:auto; }
.gen--collapsed .gen__editor{ display:none; }

@media (max-width: 820px){
  .gen{ flex-direction:column; min-height:0; }
  .gen__editor{ width:100%; height:auto; max-height:none; border-right:none; border-bottom:1px solid var(--line); }
  .gen__preview{ height:auto; min-height:60vh; }
}

.gen__bar{
  position:sticky; top:0; z-index:5; background:var(--teal-900); color:#fff;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
}
.gen__title{ display:flex; flex-direction:column; gap:1px; }
.gen__kicker{ font-size:8px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--sage-300); }
.gen__title strong{ font-family:var(--serif); font-size:19px; font-weight:600; line-height:1.05; }
.gen__hide{
  background:rgba(255,255,255,.14); color:#fff; border:none; width:28px; height:28px;
  border-radius:6px; cursor:pointer; font-size:14px; line-height:1;
}
.gen__hide:hover{ background:rgba(255,255,255,.26); }

.gen__show{
  position:fixed; top:14px; left:14px; z-index:20; display:none;
  background:var(--teal-900); color:#fff; border:none; cursor:pointer;
  padding:9px 14px; border-radius:8px; font-family:var(--sans);
  font-size:12px; font-weight:700; letter-spacing:.04em;
  box-shadow:0 6px 18px -6px rgba(15,74,86,.5);
}
.gen--collapsed .gen__show{ display:block; }

.gen__actions{ display:flex; gap:8px; padding:14px 18px 4px; flex-wrap:wrap; }
.btn{
  font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:.02em;
  padding:9px 14px; border-radius:8px; cursor:pointer; white-space:nowrap;
  border:1px solid var(--line); background:#fff; color:var(--ink);
}
.btn--primary{ flex:1 1 100%; }
.btn:hover{ border-color:var(--accent); color:var(--accent); }
.btn--primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
.btn--primary:hover{ background:var(--teal-900); border-color:var(--teal-900); color:#fff; }
.gen__autosave{ margin:6px 18px 0; font-size:10px; color:var(--ink-3); display:flex; align-items:center; gap:6px; }
.gen__autosave::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--sage-500); }

/* ---- form primitives ---- */
.ed{ padding:8px 18px 60px; }
.ed__sec{ padding:16px 0; border-bottom:1px solid var(--line-2); }
.ed__sec:last-child{ border-bottom:none; }
.ed__h{
  margin:0 0 12px; font-size:10px; font-weight:800; letter-spacing:.16em;
  text-transform:uppercase; color:var(--teal-700);
}
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.ed__field{ margin-bottom:14px; }
.ed__field:last-child{ margin-bottom:0; }
.ed__lab{ display:block; font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-2); margin-bottom:7px; }
.exptog{ display:flex; align-items:center; gap:6px; cursor:pointer; font-size:11px; color:var(--ink-2); font-weight:600; }
.exptog input{ accent-color:var(--accent); cursor:pointer; }

.f{ display:flex; flex-direction:column; gap:4px; }
.f--full{ grid-column:1 / -1; }
.f > span{ font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-2); }
.f input, .f textarea, .f select{
  font-family:var(--sans); font-size:13px; color:var(--ink);
  padding:7px 9px; border:1px solid var(--line); border-radius:6px;
  background:#fff; width:100%; box-sizing:border-box;
}
.f input.mono{ font-family:"IBM Plex Mono", monospace; font-size:12px; }
.f input.datein{ font-family:"IBM Plex Mono", monospace; font-size:12px; cursor:pointer; }
.datewrap{ position:relative; display:block; }
.datewrap .datein{ width:100%; box-sizing:border-box; }
.datewrap .datein::-webkit-calendar-picker-indicator{
  position:absolute; top:0; left:0; right:0; bottom:0; width:auto; height:auto;
  margin:0; padding:0; cursor:pointer; opacity:0;
}
.datewrap::after{
  content:"📅"; position:absolute; right:9px; top:50%; transform:translateY(-50%);
  pointer-events:none; opacity:.6; font-size:13px; line-height:1;
}
.f textarea{ resize:vertical; line-height:1.5; min-height:60px; }
.f input:focus, .f textarea:focus, .f select:focus{
  outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,108,123,.13);
}

/* ---- line-item editor cards ---- */
.card{ border:1px solid var(--line); border-radius:10px; padding:13px; margin-bottom:12px; background:#fcfdfd; }
.card__top{ display:flex; align-items:center; gap:9px; margin-bottom:11px; }
.card__no{
  flex:none; width:24px; height:24px; border-radius:50%; background:var(--accent);
  color:#fff; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;
}
.card__name{
  flex:1 1 auto; font-weight:600;
  font-family:"IBM Plex Mono", monospace; font-size:12px; color:var(--ink);
  padding:7px 9px; border:1px solid var(--line); border-radius:6px; background:#fff;
  width:100%; box-sizing:border-box;
}
.card__name:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,108,123,.13); }
.iconbtn{
  flex:none; width:26px; height:26px; border-radius:6px; cursor:pointer;
  border:1px solid var(--line); background:#fff; color:var(--ink-2);
  font-size:16px; line-height:1; display:flex; align-items:center; justify-content:center;
}
.iconbtn--del:hover{ border-color:#c0473b; color:#c0473b; background:#fdf3f2; }

.card__ext{
  margin-top:10px; padding:7px 12px; background:var(--accent-soft);
  border-radius:6px; display:flex; justify-content:space-between; align-items:baseline;
}
.card__extlab{ font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
.card__extval{ font-family:"IBM Plex Mono", monospace; font-size:13px; font-weight:700; color:var(--teal-900); }

.addbtn{
  margin-top:11px; width:100%; padding:9px; border:1px dashed var(--line);
  border-radius:8px; background:#fff; color:var(--accent); cursor:pointer;
  font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:.02em;
}
.addbtn:hover{ border-color:var(--accent); background:var(--accent-soft); }
.addbtn--sm{ margin-top:9px; padding:7px; font-size:11px; }

/* ---- preparer profiles ---- */
.prof{ display:flex; flex-direction:column; gap:9px; }
.prof__sel{
  font-family:var(--sans); font-size:13px; color:var(--ink); cursor:pointer;
  padding:7px 9px; border:1px solid var(--line); border-radius:6px; background:#fff; width:100%; box-sizing:border-box;
}
.prof__sel:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,108,123,.13); }
.prof__links{ display:flex; gap:14px; }
.prof__rm{
  align-self:flex-start; background:none; border:none; cursor:pointer; padding:0;
  font-family:var(--sans); font-size:10px; font-weight:600; color:var(--ink-3); text-decoration:underline;
}
.prof__rm:hover{ color:#c0473b; }
.prof__addhead{ font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--teal-700); }
.prof__add{ border:1px solid var(--line); border-radius:10px; padding:12px; background:#fcfdfd; display:flex; flex-direction:column; gap:11px; }
.prof__actions{ display:flex; gap:8px; }

/* ---- adjustment row toggles (discount, tax, shipping) ---- */
.adjs{ display:flex; flex-direction:column; gap:10px; }
.adj{ display:grid; grid-template-columns: 1fr 1fr; gap:9px; padding:11px; border:1px solid var(--line); border-radius:8px; background:#fcfdfd; }
.adj__head{ grid-column:1 / -1; display:flex; align-items:center; justify-content:space-between; }
.adj__title{ font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-2); }

/* =======================  PRINT  ======================= */
@page{ size:letter; margin:0; }
@media print{
  html, body{ height:auto !important; background:#fff !important; margin:0 !important; padding:0 !important; }
  body * { visibility:hidden !important; }
  #app, .gen, .gen__preview, .stage, .stage .sheet, .stage .sheet * { visibility:visible !important; }
  .gen__editor, .gen__show, #tweaks-root { display:none !important; }
  .gen{ display:block !important; min-height:0 !important; height:auto !important; }
  .gen__preview{
    position:absolute !important; left:0 !important; top:0 !important; right:0 !important;
    height:auto !important; max-height:none !important; overflow:visible !important;
  }
  .stage{ zoom:1 !important; gap:0 !important; padding:0 !important; display:block !important; }
  .sheet{ box-shadow:none !important; margin:0 auto !important; break-after:page; page-break-after:always; }
  .sheet:last-child{ break-after:auto; page-break-after:auto; }
}

</style>
</head>

  <script type="text/babel" data-presets="react">
/* global React */
// =====================================================================
//  qg-sheet.jsx — data model, totals helpers, and the Sheet renderer
//  for the live printable PharmaCenter customer quote document.
// =====================================================================

// ---------- sample / default data ----------
const QG_SAMPLE = {
  date: "2026-06-05",
  validThrough: "2026-07-05",
  customerPo: "",
  billTo: "Greenfield Apothecary, Inc.\nAttn: Procurement\n2440 Hanover Pike\nFrederick, MD 21703",
  shipTo: "",            // empty = same as bill-to
  shipSame: true,
  preparedBy: "Rosie Gutierrez",
  direct: "(786) 260-7104",
  directExt: "",
  email: "sales@pharmacenter.health",
  paymentTerms: "Net 30 from invoice date",
  shippingTerms: "FOB Origin · LTL Freight (prepaid & add)",
  items: [
    { sku: "1928", name: "NeuroBrocc · 60 Gummies Per Pouch",     detail: "Sulforaphane glucosinolate blend · vegan", qty: 240,  unit: "ea",   price: 14.85 },
    { sku: "1341", name: "SUNVIT Vitamin E 400 IU · 60 ct Bottle", detail: "Mixed tocopherols · gluten-free",          qty: 480,  unit: "ea",   price: 6.20  },
    { sku: "2207", name: "Omega-3 1200 mg · 90 Softgels",          detail: "Wild-caught, IFOS 5★ certified",            qty: 360,  unit: "ea",   price: 9.95  }
  ],
  discountOn: false,
  discountIsPct: true,
  discountValue: 5,        // 5% or $5 depending on mode

// ---------- helpers ----------
const n = (v) => (Number(v) || 0);
const money = (v) =>
  n(v).toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 });
const fmtInt = (v) => n(v).toLocaleString("en-US");

function lineExt(item) { return n(item.qty) * n(item.price); }

function quoteTotals(data) {
  const subtotal = (data.items || []).reduce((s, it) => s + lineExt(it), 0);
  let discount = 0;
  if (data.discountOn) {
    if (data.discountIsPct) discount = subtotal * (n(data.discountValue) / 100);
    else discount = n(data.discountValue);
  }
  const afterDiscount = Math.max(0, subtotal - discount);
  const tax = data.taxOn ? afterDiscount * (n(data.taxRate) / 100) : 0;
  const shipping = data.shippingOn ? n(data.shippingValue) : 0;
  const total = afterDiscount + tax + shipping;
  return { subtotal, discount, tax, shipping, total, itemCount: (data.items || []).length };
}

function formatDate(v) {
  if (!v) return "—";
  const m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return m[2] + " / " + m[3] + " / " + m[1];
  return v;
}

// Build "Ship-to" content — if "same as bill-to" is on or shipTo is empty, defer.
function resolveShipTo(data) {
  if (data.shipSame || !(data.shipTo || "").trim()) return null;
  return data.shipTo;
}

function TitleBar({ data }) {
  return (
    <div className="titlebar">
      <div className="titlebar__head">
        <h1>Quote{data.validThrough ? <span className="titlebar__valid">Valid&nbsp;through&nbsp;<b>{formatDate(data.validThrough)}</b></span> : null}</h1>
        <div className="titlebar__sub">
          <span className="titlebar__date">Issued&nbsp;{formatDate(data.date)}</span>
        </div>
      </div>
      <dl className="titlebar__meta">
        <div><dt>Prepared&nbsp;by</dt><dd>{data.preparedBy || "—"}</dd></div>
        <div>
          <dt>Contact</dt>
          <dd className="mono">
            {(data.direct || data.email) ? (
              <React.Fragment>
                {data.direct ? <span style={{ display: "block" }}>{String(data.direct).replace(/ /g, " ")}{data.directExt ? " ext. " + data.directExt : ""}</span> : null}
                {data.email ? <span style={{ display: "block" }}>{data.email}</span> : null}
              </React.Fragment>
            ) : "—"}
          </dd>
        </div>
        <div><dt>Quote&nbsp;No.</dt><dd className="mono">{data.docNo ? "QT" + String(data.docNo).padStart(4, "0") : "—"}</dd></div>
      </dl>
    </div>
  );
}

function PartyBox({ label, body, fallback }) {
  const text = (body || "").trim();
  if (!text) {
    return (
      <div className="party">
        <span className="party__label">{label}</span>
        <div className="party__body"><span className="muted">{fallback || "—"}</span></div>
      </div>
    );
  }
  return (
    <div className="party">
      <span className="party__label">{label}</span>
      <div className="party__body">
        {text.split("\n").map((line, i) =>
          i === 0 ? <strong key={i}>{line}<br /></strong> : <React.Fragment key={i}>{line}<br /></React.Fragment>
        )}
      </div>
    </div>
  );
}

function Parties({ data }) {
  const ship = resolveShipTo(data);
  return (
    <div className="parties">
      <PartyBox label="Bill To" body={data.billTo} fallback="Customer name & address" />
      {ship == null
        ? (
          <div className="party">
            <span className="party__label">Ship To</span>
            <div className="party__body"><span className="muted">Same as Bill&nbsp;To</span></div>
          </div>
        )
        : <PartyBox label="Ship To" body={ship} fallback="Customer name & address" />}
    </div>
  );
}

function Deets({ data }) {
  return (
    <dl className="deets">
      <div className="deet"><dt>Customer PO</dt><dd className="mono">{(data.customerPo || "").trim() || "—"}</dd></div>
      <div className="deet"><dt>Payment Terms</dt><dd>{(data.paymentTerms || "").trim() || "—"}</dd></div>
      <div className="deet"><dt>Shipping Terms</dt><dd>{(data.shippingTerms || "").trim() || "—"}</dd></div>
      <div className="deet"><dt>Currency</dt><dd className="mono">USD</dd></div>
    </dl>
  );
}

function ItemsTable({ items }) {
  return (
    <table className="tbl">
      <thead>
        <tr>
          <th className="c-line">#</th>
          <th className="c-sku">SKU</th>
          <th className="c-desc">Description</th>
          <th className="c-qty">Qty</th>
          <th className="c-price">Unit Price</th>
          <th className="c-ext">Ext. Price</th>
        </tr>
      </thead>
      <tbody>
        {(items || []).map((it, i) => (
          <tr key={i}>
            <td className="c-line"><span className="lineno">{i + 1}</span></td>
            <td className="c-sku mono">{it.sku || "—"}</td>
            <td className="c-desc">
              <span className="item-name">{it.name || "Untitled item"}</span>
              {it.detail ? <span className="item-sub">{it.detail}</span> : null}
            </td>
            <td className="c-qty mono">{fmtInt(it.qty)}{it.unit ? <span style={{ color: "var(--ink-3)", fontWeight: 500 }}>&nbsp;{it.unit}</span> : null}</td>
            <td className="c-price mono">{money(it.price)}</td>
            <td className="c-ext mono">{money(lineExt(it))}</td>
          </tr>
        ))}
        {(!items || items.length === 0) ? (
          <tr><td colSpan="6" style={{ textAlign: "center", color: "var(--ink-3)", padding: "18px 10px" }}>No line items yet — add some on the left.</td></tr>
        ) : null}
      </tbody>
    </table>
  );
}

function Summary({ data, tot }) {
  return (
    <div className="summary">
      <div className="summary__row">
        <dt>Subtotal</dt>
        <dd className="mono">{money(tot.subtotal)}</dd>
      </div>
      {data.discountOn ? (
        <div className="summary__row is-discount">
          <dt>Discount{data.discountIsPct ? " (" + n(data.discountValue) + "%)" : ""}</dt>
          <dd className="mono">− {money(tot.discount)}</dd>
        </div>
      ) : null}
      {data.taxOn ? (
        <div className="summary__row">
          <dt>Tax ({n(data.taxRate)}%)</dt>
          <dd className="mono">{money(tot.tax)}</dd>
        </div>
      ) : null}
      {data.shippingOn ? (
        <div className="summary__row">
          <dt>Shipping</dt>
          <dd className="mono">{money(tot.shipping)}</dd>
        </div>
      ) : null}
      <div className="summary__grand">
        <dt>Total Due</dt>
        <dd className="mono">{money(tot.total)}</dd>
      </div>
    </div>
  );
}

function TermsBlock({ data }) {
  const hasTerms = (data.paymentTerms || "").trim() || (data.shippingTerms || "").trim();
  if (!hasTerms) {
    return (
      <div className="terms">
        <span className="terms__label">Terms</span>
        <span style={{ color: "var(--ink-3)" }}>Terms applied per Customer Master Agreement.</span>
      </div>
    );
  }
  return (
    <div className="terms">
      <span className="terms__label">Terms</span>
      {data.paymentTerms ? <div><b>Payment:</b> {data.paymentTerms}</div> : null}
      {data.shippingTerms ? <div style={{ marginTop: 3 }}><b>Shipping:</b> {data.shippingTerms}</div> : null}
    </div>
  );
}

function NotesBlock({ data }) {
  if (!(data.notes || "").trim()) return null;
  return (
    <div className="notes">
      <span className="notes__label">Notes</span>
      <p>{data.notes}</p>
    </div>
  );
}

function SignBox({ data }) {
  return (
    <div className="signbox">
      <div className="signbox__col">
        <span className="signbox__label">Accepted by (Customer)</span>
        <span className="signbox__line"></span>
        <span className="signbox__hint">Signature · Printed Name · Title</span>
        <span className="signbox__line" style={{ marginTop: 8, height: 22 }}></span>
        <span className="signbox__hint">Date</span>
      </div>
      <div className="signbox__col">
        <span className="signbox__label">For PharmaCenter LLC</span>
        <span className="signbox__line"></span>
        <span className="signbox__hint">{data.preparedBy ? data.preparedBy : "Authorized Representative"}</span>
        <span className="signbox__line" style={{ marginTop: 8, height: 22 }}></span>
        <span className="signbox__hint">Date</span>
      </div>
    </div>
  );
}

function Footer({ data }) {
  const docNo = data.docNo ? "QT" + String(data.docNo).padStart(4, "0") : "";
  return (
    <footer className="ft">
      <span className="ft__msg">Thank you for considering PharmaCenter — One Solution, One Source.</span>
      <span className="ft__meta mono">{docNo ? "Doc No: " + docNo : ""}</span>
    </footer>
  );
}

// ---------- the page ----------
function Sheet({ data }) {
  const tot = quoteTotals(data);
  return (
    <section className="sheet" data-screen-label={"Quote " + (data.docNo ? "QT" + String(data.docNo).padStart(4, "0") : "")}>
      <Letterhead />
      <TitleBar data={data} />
      <Parties data={data} />
      <Deets data={data} />

      <div className="block">
        <div className="block__head">
          <h2>Items Quoted</h2>
          <span className="block__note">{tot.itemCount === 1 ? "1 line item" : tot.itemCount + " line items"} · prices in USD</span>
        </div>
        <ItemsTable items={data.items} />
      </div>

      <div className="totalsrow">
        <TermsBlock data={data} />
        <Summary data={data} tot={tot} />
      </div>

      <NotesBlock data={data} />
      <SignBox data={data} />
      <Footer data={data} />
    </section>
  );
}

Object.assign(window, { QG_SAMPLE, Sheet, quoteTotals, lineExt, qgMoney: money, qgFmtInt: fmtInt, formatDate });

  </script>
  <script type="text/babel" data-presets="react">
/* global React */
// =====================================================================
//  qg-editor.jsx — the data-entry panel for the Quote generator.
//  Pure controlled inputs that call back to the app via setData.
// =====================================================================

function Field({ label, value, onChange, type, placeholder, mono, full }) {
  return (
    <label className={"f" + (full ? " f--full" : "")}>
      <span>{label}</span>
      <input
        type={type || "text"}
        className={mono ? "mono" : ""}
        value={value == null ? "" : value}
        placeholder={placeholder || ""}
        onChange={(e) => onChange(e.target.value)}
      />
    </label>
  );
}

function NumField({ label, value, onChange, placeholder, full, step }) {
  return (
    <label className={"f" + (full ? " f--full" : "")}>
      <span>{label}</span>
      <input
        type="number"
        className="mono"
        step={step == null ? "any" : step}
        value={value == null ? "" : value}
        placeholder={placeholder || ""}
        onChange={(e) => onChange(e.target.value)}
      />
    </label>
  );
}

function DateField({ label, value, onChange }) {
  return (
    <label className="f">
      <span>{label}</span>
      <span className="datewrap">
        <input
          type="date"
          className="mono datein"
          value={value || ""}
          onChange={(e) => onChange(e.target.value)}
          onClick={(e) => { try { e.target.showPicker(); } catch (err) { /* not supported */ } }}
        />
      </span>
    </label>
  );
}

function Area({ label, value, onChange, rows, full, placeholder }) {
  return (
    <label className={"f" + (full ? " f--full" : "")}>
      <span>{label}</span>
      <textarea rows={rows || 3} value={value || ""} placeholder={placeholder || ""} onChange={(e) => onChange(e.target.value)} />
    </label>
  );
}

function ItemCard({ it, index, onChange, onRemove }) {
  const set = (k) => (v) => onChange(Object.assign({}, it, { [k]: v }));
  const ext = window.lineExt(it);
  return (
    <div className="card">
      <div className="card__top">
        <span className="card__no">{index + 1}</span>
        <input
          className="card__name"
          value={it.sku || ""}
          placeholder="SKU"
          onChange={(e) => set("sku")(e.target.value)}
        />
        <button className="iconbtn iconbtn--del" title="Remove item" onClick={onRemove}>×</button>
      </div>

      <div className="ed__field">
        <Field label="Description" value={it.name} placeholder="Product name" onChange={set("name")} />
      </div>
      <div className="ed__field">
        <Field label="Detail / sub-line" value={it.detail} placeholder="optional — shown small under the name" onChange={set("detail")} />
      </div>

      <div className="grid3">
        <NumField label="Qty" value={it.qty} placeholder="0" onChange={set("qty")} />
        <Field label="Unit" value={it.unit} placeholder="ea, btl, case" onChange={set("unit")} />
        <NumField label="Unit price (USD)" value={it.price} placeholder="0.00" step="0.01" onChange={set("price")} />
      </div>

      <div className="card__ext">
        <span className="card__extlab">Ext. Price</span>
        <span className="card__extval">{window.qgMoney(ext)}</span>
      </div>
    </div>
  );
}

function UserProfiles({ data, setData }) {
  const KEY = "pharmacenter-quote-users";
  const [users, setUsers] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(KEY) || "null");
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (e) { /* ignore */ }
    if (data.preparedBy) return [{ name: data.preparedBy, phone: data.direct || "", ext: data.directExt || "", email: data.email || "" }];
    return [];
  });
  const [adding, setAdding] = React.useState(false);
  const [editIndex, setEditIndex] = React.useState(-1);
  const [draft, setDraft] = React.useState({ name: "", phone: "", ext: "", email: "" });

  React.useEffect(() => { try { localStorage.setItem(KEY, JSON.stringify(users)); } catch (e) { /* ignore */ } }, [users]);

  const apply = (u) => setData(Object.assign({}, data, { preparedBy: u.name, direct: u.phone || "", directExt: u.ext || "", email: u.email || "" }));
  const onSelect = (e) => {
    const v = e.target.value;
    if (v === "__add") { setEditIndex(-1); setDraft({ name: "", phone: "", ext: "", email: "" }); setAdding(true); return; }
    const u = users.find((x) => x.name === v);
    if (u) apply(u);
  };
  const setD = (k) => (v) => setDraft(Object.assign({}, draft, { [k]: v }));
  const startEdit = () => {
    const idx = users.findIndex((u) => u.name === data.preparedBy);
    if (idx < 0) return;
    setEditIndex(idx);
    setDraft(Object.assign({ name: "", phone: "", ext: "", email: "" }, users[idx]));
    setAdding(true);
  };
  const saveDraft = () => {
    if (!draft.name.trim()) return;
    let list;
    if (editIndex >= 0) { list = users.slice(); list[editIndex] = Object.assign({}, draft); }
    else { list = users.concat([Object.assign({}, draft)]); }
    setUsers(list);
    apply(draft);
    setDraft({ name: "", phone: "", ext: "", email: "" });
    setAdding(false); setEditIndex(-1);
  };
  const cancelDraft = () => { setAdding(false); setEditIndex(-1); setDraft({ name: "", phone: "", ext: "", email: "" }); };
  const removeCurrent = () => {
    if (!data.preparedBy) return;
    setUsers(users.filter((u) => u.name !== data.preparedBy));
  };
  const current = users.find((u) => u.name === data.preparedBy) ? data.preparedBy : "";

  return (
    <div className="prof">
      <label className="f">
        <span>Sales rep / preparer</span>
        <select className="prof__sel" value={current} onChange={onSelect}>
          <option value="">Select preparer…</option>
          {users.slice().sort((a, b) => (a.name || "").localeCompare(b.name || "", undefined, { sensitivity: "base" })).map((u, i) => <option key={i} value={u.name}>{u.name}</option>)}
          <option value="__add">+ Add new user…</option>
        </select>
      </label>
      {current ? (
        <div className="prof__links">
          <button className="prof__rm" onClick={startEdit}>Edit “{current}”</button>
          <button className="prof__rm" onClick={removeCurrent}>Remove</button>
        </div>
      ) : null}

      {adding ? (
        <div className="prof__add">
          <div className="prof__addhead">{editIndex >= 0 ? "Edit user" : "New user"}</div>
          <div className="grid2">
            <Field label="Name" value={draft.name} onChange={setD("name")} />
            <Field label="Phone" value={draft.phone} mono onChange={setD("phone")} />
            <Field label="Ext" value={draft.ext} mono placeholder="optional" onChange={setD("ext")} />
            <Field label="Email" value={draft.email} mono onChange={setD("email")} />
          </div>
          <div className="prof__actions">
            <button className="btn btn--primary" onClick={saveDraft}>{editIndex >= 0 ? "Update user" : "Save user"}</button>
            <button className="btn" onClick={cancelDraft}>Cancel</button>
          </div>
        </div>
      ) : null}
    </div>
  );
}

function Editor({ data, setData }) {
  const set = (k) => (v) => setData(Object.assign({}, data, { [k]: v }));

  const setItem = (i, ni) => {
    const items = (data.items || []).slice();
    items[i] = ni;
    setData(Object.assign({}, data, { items }));
  };
  const addItem = () =>
    setData(Object.assign({}, data, {
      items: (data.items || []).concat([{ sku: "", name: "", detail: "", qty: 1, unit: "ea", price: 0 }])
    }));
  const removeItem = (i) =>
    setData(Object.assign({}, data, { items: (data.items || []).filter((_, j) => j !== i) }));

  return (
    <div className="ed">
      <div className="ed__sec">
        <h4 className="ed__h">Quote Dates</h4>
        <div className="grid2">
          <DateField label="Issued" value={data.date} onChange={(v) => setData(Object.assign({}, data, { date: v, dateTouched: true }))} />
          <DateField label="Valid through" value={data.validThrough} onChange={set("validThrough")} />
        </div>
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Sales Rep</h4>
        <UserProfiles data={data} setData={setData} />
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Bill To</h4>
        <Area label="Customer (first line shown bold)" value={data.billTo} rows={4} full onChange={set("billTo")} />
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Ship To</h4>
        <label className="exptog" style={{ marginBottom: 8 }}>
          <input type="checkbox" checked={!!data.shipSame} onChange={(e) => set("shipSame")(e.target.checked)} />
          Same as Bill&nbsp;To
        </label>
        {!data.shipSame ? (
          <Area label="Ship-to address" value={data.shipTo} rows={4} full placeholder="Customer / receiving address" onChange={set("shipTo")} />
        ) : null}
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Order Details</h4>
        <div className="ed__field">
          <Field label="Customer PO" value={data.customerPo} mono placeholder="optional" onChange={set("customerPo")} />
        </div>
        <div className="ed__field">
          <Field label="Payment terms" value={data.paymentTerms} placeholder="Net 30 from invoice date" onChange={set("paymentTerms")} />
        </div>
        <div className="ed__field">
          <Field label="Shipping terms" value={data.shippingTerms} placeholder="FOB Origin · LTL Freight" onChange={set("shippingTerms")} />
        </div>
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Line Items</h4>
        {(data.items || []).map((it, i) => (
          <ItemCard
            key={i}
            it={it}
            index={i}
            onChange={(ni) => setItem(i, ni)}
            onRemove={() => removeItem(i)}
          />
        ))}
        <button className="addbtn" onClick={addItem}>+ Add line item</button>
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Adjustments</h4>
        <div className="adjs">
          {/* Discount */}
          <div className="adj">
            <div className="adj__head">
              <span className="adj__title">Discount</span>
              <label className="exptog">
                <input type="checkbox" checked={!!data.discountOn} onChange={(e) => set("discountOn")(e.target.checked)} />
                Apply
              </label>
            </div>
            {data.discountOn ? (
              <React.Fragment>
                <label className="f">
                  <span>Mode</span>
                  <select value={data.discountIsPct ? "pct" : "amt"} onChange={(e) => set("discountIsPct")(e.target.value === "pct")}>
                    <option value="pct">Percent</option>
                    <option value="amt">Flat amount (USD)</option>
                  </select>
                </label>
                <NumField label={data.discountIsPct ? "%" : "USD"} value={data.discountValue} step="0.01" onChange={set("discountValue")} />
              </React.Fragment>
            ) : null}
          </div>

          {/* Tax */}
          <div className="adj">
            <div className="adj__head">
              <span className="adj__title">Sales tax</span>
              <label className="exptog">
                <input type="checkbox" checked={!!data.taxOn} onChange={(e) => set("taxOn")(e.target.checked)} />
                Apply
              </label>
            </div>
            {data.taxOn ? (
              <NumField label="Rate (%)" value={data.taxRate} step="0.001" full onChange={set("taxRate")} />
            ) : null}
          </div>

          {/* Shipping */}
          <div className="adj">
            <div className="adj__head">
              <span className="adj__title">Shipping</span>
              <label className="exptog">
                <input type="checkbox" checked={!!data.shippingOn} onChange={(e) => set("shippingOn")(e.target.checked)} />
                Apply
              </label>
            </div>
            {data.shippingOn ? (
              <NumField label="Amount (USD)" value={data.shippingValue} step="0.01" full onChange={set("shippingValue")} />
            ) : null}
          </div>
        </div>
      </div>

      <div className="ed__sec">
        <h4 className="ed__h">Notes / Terms &amp; Conditions</h4>
        <Area label="Shown at the bottom of the quote" value={data.notes} rows={5} full placeholder="e.g. pricing validity, lead time, standard terms…" onChange={set("notes")} />
      </div>
    </div>
  );
}

Object.assign(window, { Editor });

  </script>
  <script type="text/babel" data-presets="react">
/* global React, ReactDOM, Editor, Sheet, QG_SAMPLE */
// =====================================================================
//  qg-app.jsx — top-level Quote generator: holds the data, persists to
//  localStorage under "pharmacenter-quote" (NEVER touch
//  "pharmacenter-packing-list"), renders the editor + live document,
//  and handles print / sample / blank.
// =====================================================================

const STORAGE_KEY  = "pharmacenter-quote";          // never reuse the packing-list key
const COUNTER_KEY  = "pharmacenter-quote-counter";  // sequential QT0001, QT0002…

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = migrate(JSON.parse(raw));
      if (!d.docNo) d.docNo = nextDocNo();
      if (!d.dateTouched) d.date = todayIso();
      // valid-through defaults: 30 days from today if blank
      if (!d.validThrough) d.validThrough = isoPlusDays(30);
      return d;
    }
  } catch (e) { /* ignore */ }
  const s = JSON.parse(JSON.stringify(QG_SAMPLE));
  s.docNo = nextDocNo();
  s.date = todayIso();
  s.validThrough = isoPlusDays(30);
  s.dateTouched = false;
  return s;
}

function todayIso() {
  const t = new Date();
  return t.getFullYear() + "-" + String(t.getMonth() + 1).padStart(2, "0") + "-" + String(t.getDate()).padStart(2, "0");
}
function isoPlusDays(days) {
  const t = new Date();
  t.setDate(t.getDate() + days);
  return t.getFullYear() + "-" + String(t.getMonth() + 1).padStart(2, "0") + "-" + String(t.getDate()).padStart(2, "0");
}

// Sequential quote document number (QT0001, QT0002…) persisted on its own key
// — independent of any packing-list counter.
function nextDocNo() {
  let n = 0;
  try { n = parseInt(localStorage.getItem(COUNTER_KEY) || "0", 10) || 0; } catch (e) { /* ignore */ }
  n += 1;
  try { localStorage.setItem(COUNTER_KEY, String(n)); } catch (e) { /* ignore */ }
  return n;
}

// Light migration for older saved shapes (forward-compat hook).
function migrate(d) {
  if (!d || typeof d !== "object") return JSON.parse(JSON.stringify(QG_SAMPLE));
  if (!Array.isArray(d.items)) d.items = [];
  // Coerce required adjustment flags so checkboxes show predictable state.
  if (typeof d.discountOn  === "undefined") d.discountOn  = false;
  if (typeof d.discountIsPct === "undefined") d.discountIsPct = true;
  if (typeof d.taxOn       === "undefined") d.taxOn       = false;
  if (typeof d.shippingOn  === "undefined") d.shippingOn  = false;
  if (typeof d.shipSame    === "undefined") d.shipSame    = !d.shipTo;
  return d;
}

function App() {
  const [data, setData] = React.useState(loadData);
  const [collapsed, setCollapsed] = React.useState(false);
  const [scale, setScale] = React.useState(1);
  const previewRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { /* ignore */ }
  }, [data]);

  // Fit the 8.5in sheet to the available preview width.
  React.useEffect(() => {
    const SHEET = 8.5 * 96; // px
    const fit = () => {
      const el = previewRef.current;
      if (!el) return;
      const avail = el.clientWidth - 56;
      setScale(Math.min(1, Math.max(0.4, avail / SHEET)));
    };
    fit();
    const ro = new ResizeObserver(fit);
    if (previewRef.current) ro.observe(previewRef.current);
    window.addEventListener("resize", fit);
    return () => { ro.disconnect(); window.removeEventListener("resize", fit); };
  }, [collapsed]);

  // If opened in a real (non-sandboxed) tab with ?print=1, auto-open the print dialog.
  React.useEffect(() => {
    if (/[?&]print=1/.test(window.location.search)) {
      const t = setTimeout(() => { try { window.print(); } catch (e) { /* ignore */ } }, 900);
      return () => clearTimeout(t);
    }
  }, []);

  // Print the current quote. In sandboxed preview, window.print() is blocked, so open
  // the live document in a real tab that auto-prints.
  const printDoc = () => {
    if (window.self !== window.top) {
      try {
        const href = window.location.href.split("#")[0];
        const url = href + (href.indexOf("?") >= 0 ? "&" : "?") + "print=1";
        window.open(url, "_blank");
        return;
      } catch (e) { /* fall through */ }
    }
    try { window.print(); } catch (e) { /* ignore */ }
  };

  const sample = () => {
    if (window.confirm("Reset to the sample quote? Your current entries will be cleared.")) {
      const fresh = JSON.parse(JSON.stringify(QG_SAMPLE));
      fresh.docNo = nextDocNo();
      fresh.date = todayIso();
      fresh.validThrough = isoPlusDays(30);
      setData(fresh);
    }
  };
  const blank = () => {
    if (window.confirm("Start a blank quote?")) {
      setData({
        docNo: nextDocNo(),
        date: todayIso(),
        validThrough: isoPlusDays(30),
        dateTouched: false,
        customerPo: "",
        billTo: "Customer Name\nStreet Address\nCity, ST ZIP",
        shipTo: "",
        shipSame: true,
        preparedBy: "",
        direct: "",
        directExt: "",
        email: "",
        paymentTerms: "Net 30 from invoice date",
        shippingTerms: "FOB Origin · LTL Freight",
        items: [{ sku: "", name: "", detail: "", qty: 1, unit: "ea", price: 0 }],
        discountOn: false,
        discountIsPct: true,
        discountValue: 0,
        taxOn: false,
        taxRate: 0,
        shippingOn: false,
        shippingValue: 0,
        notes: ""
      });
    }
  };

  return (
    <div className={"gen" + (collapsed ? " gen--collapsed" : "")}>
      <aside className="gen__editor">
        <div className="gen__bar">
          <div className="gen__title">
            <span className="gen__kicker">PharmaCenter</span>
            <strong>Generate Quote</strong>
          </div>
          <button className="gen__hide" title="Hide panel" onClick={() => setCollapsed(true)}>⟨</button>
        </div>
        <div className="gen__actions">
          <button className="btn btn--primary" onClick={printDoc}>Print / Save PDF</button>
          <button className="btn" onClick={sample}>Sample</button>
          <button className="btn" onClick={blank}>Blank</button>
        </div>
        <p className="gen__autosave">Auto-saves as you type</p>
        <Editor data={data} setData={setData} />
      </aside>

      <button className="gen__show" title="Show editor" onClick={() => setCollapsed(false)}>⟩ Edit</button>

      <main className="gen__preview" ref={previewRef}>
        <div className="stage" id="stage" style={{ zoom: scale }}>
          <Sheet data={data} />
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

  </script>
</body>
